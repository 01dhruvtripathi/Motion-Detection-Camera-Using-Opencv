<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#080d0a"/>
      <stop offset="100%" style="stop-color:#0a0d08"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bg8)"/>
  <text x="450" y="22" text-anchor="middle" font-size="12" fill="#558855" letter-spacing="5">PROJECT FILE STRUCTURE</text>

  <!-- Tree structure centered -->
  <!-- Root folder -->
  <rect x="280" y="35" width="340" height="36" rx="6" fill="#0d1a10" stroke="#336633" stroke-width="1.5"/>
  <text x="370" y="57" font-size="13" fill="#55cc55">📁</text>
  <text x="395" y="57" font-size="13" font-weight="bold" fill="#88ee88">Motion-Detection-Camera-Using-Opencv</text>
  <text x="295" y="83" font-size="11" fill="#336633">/</text>

  <!-- Branch lines -->
  <line x1="300" y1="87" x2="300" y2="135" stroke="#225522" stroke-width="1.5"/>
  <line x1="300" y1="110" x2="335" y2="110" stroke="#225522" stroke-width="1.5"/>
  <line x1="300" y1="150" x2="335" y2="150" stroke="#225522" stroke-width="1.5"/>

  <!-- File 1 -->
  <rect x="335" y="92" width="380" height="34" rx="6" fill="#0a1a0c" stroke="#226622" stroke-width="1.5"/>
  <text x="350" y="113" font-size="13" fill="#4488ff">🐍</text>
  <text x="375" y="113" font-size="12" fill="#aaccff">Motion Detection Camera</text>
  <text x="570" y="113" font-size="12" fill="#6688bb">.py</text>
  <rect x="640" y="97" width="68" height="18" rx="4" fill="#0d2040"/>
  <text x="674" y="110" text-anchor="middle" font-size="9" fill="#4488ff">MAIN SCRIPT</text>

  <!-- File 2 -->
  <rect x="335" y="133" width="380" height="34" rx="6" fill="#1a1205" stroke="#664422" stroke-width="1.5"/>
  <text x="350" y="154" font-size="13" fill="#ff9900">🔊</text>
  <text x="375" y="154" font-size="12" fill="#ffcc88">alarm</text>
  <text x="411" y="154" font-size="12" fill="#cc8844">.mp3.wav</text>
  <rect x="640" y="137" width="68" height="18" rx="4" fill="#201408"/>
  <text x="674" y="150" text-anchor="middle" font-size="9" fill="#ff9900">AUDIO FILE</text>

  <!-- Annotations -->
  <line x1="715" y1="109" x2="775" y2="109" stroke="#224422" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="780" y="113" font-size="9" fill="#558855">228 lines of code</text>
  <line x1="715" y1="150" x2="775" y2="150" stroke="#443322" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="780" y="154" font-size="9" fill="#886644">pygame.mixer</text>

  <!-- Bottom note -->
  <rect x="280" y="175" width="340" height="18" rx="4" fill="#080d08" stroke="#224422" stroke-width="1"/>
  <text x="450" y="188" text-anchor="middle" font-size="9" fill="#446644">⚠  Both files must be in the same directory</text>
</svg>
