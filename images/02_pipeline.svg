<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1a"/>
      <stop offset="100%" style="stop-color:#0d1b33"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2a4a"/>
      <stop offset="100%" style="stop-color:#061525"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2e1a"/>
      <stop offset="100%" style="stop-color:#051208"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff88"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff9900"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="14" fill="#7ab8e8" letter-spacing="4">PROCESSING PIPELINE</text>
  <line x1="100" y1="36" x2="350" y2="36" stroke="#1a3a5a" stroke-width="1"/>
  <line x1="550" y1="36" x2="800" y2="36" stroke="#1a3a5a" stroke-width="1"/>

  <!-- Node 1: Webcam Input -->
  <rect x="30" y="55" width="120" height="70" rx="8" fill="url(#boxBlue)" stroke="#00c6ff" stroke-width="1.5"/>
  <text x="90" y="80" text-anchor="middle" font-size="10" fill="#00c6ff" letter-spacing="1">📷 INPUT</text>
  <text x="90" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">WEBCAM</text>
  <text x="90" y="113" text-anchor="middle" font-size="9" fill="#7ab8e8">cap.read()</text>
  <line x1="150" y1="90" x2="178" y2="90" stroke="#00c6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Node 2: Frame -->
  <rect x="180" y="55" width="120" height="70" rx="8" fill="url(#boxBlue)" stroke="#0072ff" stroke-width="1.5"/>
  <text x="240" y="80" text-anchor="middle" font-size="10" fill="#0072ff" letter-spacing="1">🖼 FRAME</text>
  <text x="240" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">BGR IMAGE</text>
  <text x="240" y="113" text-anchor="middle" font-size="9" fill="#7ab8e8">H × W × 3</text>

  <!-- Branches from Frame down -->
  <line x1="240" y1="125" x2="240" y2="150" stroke="#0072ff" stroke-width="1.5"/>
  <!-- Split into 3 branches -->
  <line x1="100" y1="150" x2="760" y2="150" stroke="#0072ff" stroke-width="1"/>
  <line x1="100" y1="150" x2="100" y2="170" stroke="#0072ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="380" y1="150" x2="380" y2="170" stroke="#0072ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="660" y1="150" x2="660" y2="170" stroke="#0072ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Branch 1: Face Detection -->
  <rect x="35" y="170" width="130" height="65" rx="7" fill="url(#boxBlue)" stroke="#00c6ff" stroke-width="1.5"/>
  <text x="100" y="191" text-anchor="middle" font-size="9" fill="#00c6ff" letter-spacing="1">👤 GRAYSCALE</text>
  <text x="100" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">FACE DETECT</text>
  <text x="100" y="224" text-anchor="middle" font-size="8" fill="#7ab8e8">Haar Cascade XML</text>
  <line x1="100" y1="235" x2="100" y2="255" stroke="#00c6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Sub: Eye -->
  <rect x="35" y="255" width="130" height="45" rx="7" fill="url(#boxBlue)" stroke="#00aaff" stroke-width="1"/>
  <text x="100" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">👁  EYE DETECT</text>
  <text x="100" y="291" text-anchor="middle" font-size="8" fill="#7ab8e8">ROI → Eye Cascade</text>

  <!-- Branch 2: Motion Detection -->
  <rect x="315" y="170" width="130" height="65" rx="7" fill="url(#boxGreen)" stroke="#00ff88" stroke-width="1.5"/>
  <text x="380" y="191" text-anchor="middle" font-size="9" fill="#00ff88" letter-spacing="1">🎭 MOG2</text>
  <text x="380" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">MOTION DETECT</text>
  <text x="380" y="224" text-anchor="middle" font-size="8" fill="#a0e8c0">Background Subtractor</text>
  <line x1="380" y1="235" x2="380" y2="255" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Sub: Contours -->
  <rect x="315" y="255" width="130" height="45" rx="7" fill="url(#boxGreen)" stroke="#00cc66" stroke-width="1"/>
  <text x="380" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">📦 CONTOURS</text>
  <text x="380" y="291" text-anchor="middle" font-size="8" fill="#a0e8c0">area &gt; 300px²</text>

  <!-- Branch 3: Color Detection -->
  <rect x="595" y="170" width="130" height="65" rx="7" fill="#1a1008" stroke="#ff9900" stroke-width="1.5"/>
  <text x="660" y="191" text-anchor="middle" font-size="9" fill="#ff9900" letter-spacing="1">🎨 HSV SPACE</text>
  <text x="660" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">COLOR DETECT</text>
  <text x="660" y="224" text-anchor="middle" font-size="8" fill="#ffc870">Blue Mask: H 100-140</text>
  <line x1="660" y1="235" x2="660" y2="255" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Sub: Blue mask -->
  <rect x="595" y="255" width="130" height="45" rx="7" fill="#1a1008" stroke="#cc7700" stroke-width="1"/>
  <text x="660" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">🔵 BLUE MASK</text>
  <text x="660" y="291" text-anchor="middle" font-size="8" fill="#ffc870">inRange() filter</text>

  <!-- Merge to Alarm -->
  <line x1="100" y1="300" x2="100" y2="310" stroke="#ff4444" stroke-width="1"/>
  <line x1="380" y1="300" x2="380" y2="310" stroke="#ff4444" stroke-width="1"/>
  <line x1="660" y1="300" x2="660" y2="310" stroke="#ff4444" stroke-width="1"/>
  <line x1="100" y1="310" x2="660" y2="310" stroke="#ff4444" stroke-width="1.5"/>
  <line x1="380" y1="310" x2="380" y2="320" stroke="#ff4444" stroke-width="1.5"/>

  <!-- Alarm node -->
  <rect x="800" y="115" width="85" height="85" rx="8" fill="#2a0808" stroke="#ff4444" stroke-width="2"/>
  <text x="842" y="145" text-anchor="middle" font-size="18" fill="#ff4444" filter="url(#glow2)">🔔</text>
  <text x="842" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6666">ALARM</text>
  <text x="842" y="178" text-anchor="middle" font-size="9" fill="#ff9999">Thread</text>
  <text x="842" y="191" text-anchor="middle" font-size="8" fill="#cc6666">alarm.wav</text>

  <!-- Connect branches to alarm -->
  <line x1="300" y1="90" x2="798" y2="155" stroke="#ff4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
</svg>
