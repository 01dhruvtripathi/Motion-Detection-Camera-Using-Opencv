<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050808"/>
      <stop offset="100%" style="stop-color:#060a0a"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="320" fill="url(#bg9)"/>

  <!-- Camera window frame -->
  <rect x="30" y="30" width="580" height="265" rx="10" fill="#04080a" stroke="#00c6ff" stroke-width="2"/>
  <!-- Screen scanlines effect -->
  <rect x="30" y="30" width="580" height="265" rx="10" fill="url(#bg9)" opacity="0.3"/>

  <!-- Top HUD bar -->
  <rect x="30" y="30" width="580" height="28" rx="10" fill="#041520"/>
  <circle cx="55" cy="44" r="5" fill="#00ff88"/>
  <text x="70" y="48" font-size="10" fill="#00ff88" letter-spacing="1">● LIVE</text>
  <text x="130" y="48" font-size="10" fill="#336699">|  CAM 0</text>
  <text x="220" y="48" font-size="10" fill="#336699">|  30 FPS</text>
  <text x="310" y="48" font-size="10" fill="#336699">|  1280×720</text>
  <text x="500" y="48" font-size="10" fill="#00c6ff">DETECTING...</text>

  <!-- Simulated camera content -->
  <rect x="40" y="65" width="560" height="220" rx="4" fill="#0a0f0a"/>

  <!-- Background scene elements -->
  <rect x="40" y="230" width="560" height="55" fill="#0d120d"/><!-- floor -->
  <rect x="440" y="65" width="160" height="165" fill="#0c100c"/><!-- wall right -->
  <rect x="40" y="65" width="100" height="165" fill="#0b0f0b"/><!-- wall left -->

  <!-- Person 1 with face + eye detection -->
  <!-- Body -->
  <rect x="140" y="165" width="65" height="120" rx="6" fill="#1a2235"/>
  <!-- Head -->
  <circle cx="172" cy="148" r="30" fill="#c8a882"/>
  <!-- Eyes -->
  <ellipse cx="161" cy="142" rx="8" ry="5" fill="#fff"/>
  <circle cx="161" cy="142" r="3" fill="#1a1a2a"/>
  <ellipse cx="183" cy="142" rx="8" ry="5" fill="#fff"/>
  <circle cx="183" cy="142" r="3" fill="#1a1a2a"/>
  <!-- Mouth -->
  <path d="M 161 159 Q 172 165 183 159" fill="none" stroke="#7a5540" stroke-width="1.5"/>
  <!-- FACE bounding box -->
  <rect x="140" y="115" width="64" height="65" rx="3" fill="none" stroke="#4488ff" stroke-width="2.5" filter="url(#glow9)"/>
  <rect x="140" y="107" width="44" height="12" rx="2" fill="#4488ff"/>
  <text x="162" y="117" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">FACE</text>
  <!-- Eye boxes -->
  <rect x="151" y="136" width="20" height="12" rx="2" fill="none" stroke="#00ff88" stroke-width="1.8" filter="url(#glow9)"/>
  <rect x="173" y="136" width="20" height="12" rx="2" fill="none" stroke="#00ff88" stroke-width="1.8" filter="url(#glow9)"/>

  <!-- Person 2 (moving) — has motion box -->
  <rect x="310" y="135" width="55" height="150" rx="5" fill="#192030"/>
  <circle cx="337" cy="122" r="26" fill="#d4b090"/>
  <ellipse cx="328" cy="116" rx="7" ry="4" fill="#fff"/>
  <circle cx="328" cy="116" r="2.5" fill="#1a1a2a"/>
  <ellipse cx="346" cy="116" rx="7" ry="4" fill="#fff"/>
  <circle cx="346" cy="116" r="2.5" fill="#1a1a2a"/>
  <!-- FACE box 2 -->
  <rect x="310" y="94" width="54" height="56" rx="3" fill="none" stroke="#4488ff" stroke-width="2" filter="url(#glow9)"/>
  <!-- Motion box (larger, green) -->
  <rect x="295" y="88" width="85" height="200" rx="4" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow9)"/>
  <rect x="295" y="80" width="56" height="12" rx="2" fill="#003311"/>
  <text x="323" y="89" text-anchor="middle" font-size="8" fill="#00ff88">MOTION</text>

  <!-- Blue object -->
  <rect x="460" y="160" width="38" height="90" rx="6" fill="#1a44cc"/>
  <rect x="469" y="150" width="20" height="16" rx="3" fill="#2255ee"/>
  <!-- Blue detection box -->
  <rect x="455" y="146" width="50" height="108" rx="3" fill="none" stroke="#ff9900" stroke-width="2.5" filter="url(#glow9)"/>
  <rect x="455" y="138" width="50" height="12" rx="2" fill="#332200"/>
  <text x="480" y="147" text-anchor="middle" font-size="8" fill="#ff9900">BLUE OBJ</text>

  <!-- Corner HUD targets -->
  <polyline points="48,73 48,88 63,88" fill="none" stroke="#00c6ff" stroke-width="1.5" opacity="0.6"/>
  <polyline points="592,73 592,88 577,88" fill="none" stroke="#00c6ff" stroke-width="1.5" opacity="0.6"/>
  <polyline points="48,277 48,262 63,262" fill="none" stroke="#00c6ff" stroke-width="1.5" opacity="0.6"/>
  <polyline points="592,277 592,262 577,262" fill="none" stroke="#00c6ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom HUD on camera -->
  <rect x="40" y="265" width="560" height="20" rx="2" fill="#030c10" opacity="0.9"/>
  <text x="55" y="278" font-size="8" fill="#00c6ff">Faces: 2</text>
  <text x="125" y="278" font-size="8" fill="#00ff88">Motion: YES</text>
  <text x="215" y="278" font-size="8" fill="#ff9900">Blue Objects: 1</text>
  <text x="340" y="278" font-size="8" fill="#ff4444">⚠ ALARM TRIGGERED</text>
  <text x="530" y="278" font-size="8" fill="#4488ff">Q = Quit</text>

  <!-- Right Panel: Live Stats -->
  <rect x="630" y="30" width="245" height="265" rx="10" fill="#04080a" stroke="#1a3a4a" stroke-width="1.5"/>
  <text x="752" y="52" text-anchor="middle" font-size="11" fill="#00c6ff" letter-spacing="3">DETECTION LOG</text>
  <line x1="640" y1="58" x2="865" y2="58" stroke="#1a3a4a" stroke-width="1"/>

  <!-- Log entries -->
  <rect x="640" y="65" width="225" height="38" rx="4" fill="#041520"/>
  <text x="655" y="80" font-size="9" fill="#4488ff">👤 FACE DETECTED</text>
  <text x="655" y="93" font-size="8" fill="#336699">  2 faces  |  4 eyes</text>

  <rect x="640" y="108" width="225" height="38" rx="4" fill="#041508"/>
  <text x="655" y="123" font-size="9" fill="#00ff88">🏃 MOTION DETECTED</text>
  <text x="655" y="136" font-size="8" fill="#226622">  contours: 3  |  area: 1244px²</text>

  <rect x="640" y="151" width="225" height="38" rx="4" fill="#141005"/>
  <text x="655" y="166" font-size="9" fill="#ff9900">🔵 BLUE OBJ DETECTED</text>
  <text x="655" y="179" font-size="8" fill="#664400">  contours: 1  |  area: 512px²</text>

  <rect x="640" y="194" width="225" height="38" rx="4" fill="#1a0404"/>
  <text x="655" y="209" font-size="9" fill="#ff4444" filter="url(#glow9)">🔔 ALARM TRIGGERED</text>
  <text x="655" y="222" font-size="8" fill="#662222">  playing: alarm.mp3.wav</text>

  <!-- Alarm status pulse ring -->
  <circle cx="752" cy="262" r="18" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#screenGlow)" opacity="0.6"/>
  <circle cx="752" cy="262" r="10" fill="#ff4444" opacity="0.8" filter="url(#glow9)"/>
  <text x="752" y="266" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">ON</text>
</svg>
