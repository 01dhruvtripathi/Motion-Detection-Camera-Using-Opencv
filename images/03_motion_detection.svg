<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#07100a"/>
      <stop offset="100%" style="stop-color:#030806"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#bg3)"/>

  <!-- Section label -->
  <rect x="0" y="0" width="900" height="3" fill="#00ff88"/>
  <text x="450" y="25" text-anchor="middle" font-size="13" fill="#00ff88" letter-spacing="4" filter="url(#glow3)">MOTION DETECTION — MOG2 BACKGROUND SUBTRACTION</text>

  <!-- Panel 1: Original Frame -->
  <rect x="30" y="45" width="240" height="185" rx="6" fill="#0a1a0d" stroke="#00ff88" stroke-width="1.5"/>
  <text x="150" y="64" text-anchor="middle" font-size="10" fill="#00ff88" letter-spacing="2">FRAME INPUT</text>
  <!-- Simulated camera view with a person silhouette moving -->
  <rect x="45" y="72" width="210" height="148" rx="3" fill="#0d1f10"/>
  <!-- Background elements (static) -->
  <rect x="55" y="160" width="190" height="55" rx="2" fill="#112615"/><!-- floor -->
  <rect x="200" y="100" width="40" height="110" rx="2" fill="#0f1e12"/><!-- door/wall feature -->
  <rect x="55" y="80" width="60" height="80" rx="2" fill="#0e1c11"/><!-- object static -->
  <!-- Person silhouette (moving) - bright -->
  <ellipse cx="155" cy="105" rx="18" ry="22" fill="#2a5c32"/><!-- body -->
  <circle cx="155" cy="87" r="10" fill="#2a5c32"/><!-- head -->
  <!-- Bounding box (green) -->
  <rect x="132" y="74" width="46" height="66" rx="2" fill="none" stroke="#00ff88" stroke-width="2" filter="url(#glow3)"/>
  <text x="132" y="70" font-size="8" fill="#00ff88">MOTION</text>

  <text x="150" y="245" text-anchor="middle" font-size="9" fill="#5a9e6a">cv2.VideoCapture(0)</text>

  <!-- Arrow -->
  <text x="285" y="143" font-size="22" fill="#00ff88" filter="url(#glow3)">→</text>

  <!-- Panel 2: FG Mask -->
  <rect x="310" y="45" width="240" height="185" rx="6" fill="#050f07" stroke="#44ff99" stroke-width="1.5"/>
  <text x="430" y="64" text-anchor="middle" font-size="10" fill="#44ff99" letter-spacing="2">FG MASK</text>
  <rect x="325" y="72" width="210" height="148" rx="3" fill="#000"/>
  <!-- White blobs representing motion areas -->
  <ellipse cx="435" cy="125" rx="20" ry="26" fill="#ffffff" opacity="0.9"/>
  <circle cx="435" cy="107" r="11" fill="#ffffff" opacity="0.9"/>
  <!-- Smaller noise spots -->
  <ellipse cx="370" cy="180" rx="5" ry="3" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="510" cy="140" rx="3" ry="4" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="390" cy="100" rx="2" ry="2" fill="#ffffff" opacity="0.15"/>
  <text x="430" y="245" text-anchor="middle" font-size="9" fill="#5a9e6a">fgbg.apply(frame)</text>

  <!-- Arrow -->
  <text x="565" y="143" font-size="22" fill="#00ff88" filter="url(#glow3)">→</text>

  <!-- Panel 3: Threshold + Contours -->
  <rect x="590" y="45" width="240" height="185" rx="6" fill="#050f07" stroke="#00cc55" stroke-width="1.5"/>
  <text x="710" y="64" text-anchor="middle" font-size="10" fill="#00cc55" letter-spacing="2">THRESHOLD + DETECT</text>
  <rect x="605" y="72" width="210" height="148" rx="3" fill="#050f07"/>
  <!-- Threshold binary blob -->
  <ellipse cx="710" cy="125" rx="22" ry="28" fill="#003311" stroke="#00ff88" stroke-width="1"/>
  <circle cx="710" cy="103" r="12" fill="#003311" stroke="#00ff88" stroke-width="1"/>
  <!-- Bounding rect -->
  <rect x="682" y="85" width="56" height="76" rx="2" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow3)"/>
  <!-- Contour highlight -->
  <ellipse cx="710" cy="125" rx="22" ry="28" fill="none" stroke="#00ff44" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="710" cy="103" r="12" fill="none" stroke="#00ff44" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Area label -->
  <rect x="686" y="165" width="48" height="14" rx="2" fill="#003311"/>
  <text x="710" y="175" text-anchor="middle" font-size="8" fill="#00ff88">area=847px²</text>
  <text x="710" y="245" text-anchor="middle" font-size="9" fill="#5a9e6a">findContours() &gt; 300px²</text>

  <!-- Bottom info bar -->
  <rect x="30" y="238" width="800" height="34" rx="4" fill="#0a1a0d" opacity="0.6"/>
  <text x="80" y="259" font-size="9" fill="#00ff88">● MOG2</text>
  <text x="130" y="259" font-size="9" fill="#5a9e6a">— Adaptive Gaussian Mixture Model updates background every frame</text>
  <text x="650" y="259" font-size="9" fill="#00ff88">THRESHOLD: 244</text>
  <text x="750" y="259" font-size="9" fill="#00ff88">MIN AREA: 300px²</text>
</svg>
